version: 2

goal:
  title: "BabyMinimo Complete App Build"
  slug: "babyminimo-fast-demo"
  kind: specific
  tranche: "Complete app implementation: shared visual system parity, all approved BabyMinimo UI screens, Firebase Emulator-backed auth/care flows, local-only Growth Timeline, settings/plans/account, states, analytics hooks, and simulator visual QA per screen."
  status: done
  intake:
    original_request: "Implement all UI and functionality of the BabyMinimo app end to end, always testing each feature/screen, using GoalBuddy."
    interpreted_outcome: "Build a complete runnable BabyMinimo mobile app aligned to the approved Superdesign screenshots, backed by Firebase Emulator where applicable, with each screen and feature verified before acceptance."
    input_shape: specific
    audience: "BabyMinimo builders and demo users"
    authority: requested
    proof_type: demo
    completion_proof: "The local app runs end to end in iOS simulator and covers auth, onboarding, Home, quick logging, Timeline, Growth Timeline, Handoff, reminders, caregivers, settings, plans, account/sign-out, states, and analytics hooks with tests plus simulator screenshot receipts."
    likely_misfire: "Keeping the old fast-demo scope, accepting approximate visual matches, or completing code without per-screen simulator evidence."
    blind_spots_considered:
      - "Kimi K2.6 currently fails the OpenCode JSON Schema smoke gate and must not be used for implementation until it passes."
      - "GLM-5.1 and Qwen 3.6 Plus pass local OpenCode smoke gates as of 2026-05-23."
      - "Firebase is deferred, so shared-data boundaries must be mock/demo adapters that are easy to replace later."
      - "Firebase CLI exists locally, but emulator config is absent; emulator setup should be optional and not block the first runnable demo."
      - "Growth Timeline must remain inside Timeline and local-only."
      - "Approved screenshots in docs/product/superdesign-reference-assets/screenshots1/ and approved logo assets must remain the visual source of truth."
    existing_plan_facts:
      - "Fast demo order: Foundation, Auth/onboarding, Home, Quick Log plus breastfeed and diaper, Timeline, Handoff, Growth Timeline/Add Moment."
      - "Use GoalBuddy for broad work coordination."
      - "Use Codex as PM/planner/reviewer."
      - "Use GLM-5.1 for bounded OpenCode implementation when its smoke gate passes."
      - "Use Qwen 3.6 Plus as the safe OpenCode fallback."
      - "Use Kimi K2.6 only if its JSON Schema smoke gate passes."
      - "Do not wire Firebase now."
      - "Firebase Emulator is optional for a later local-backend slice."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  ui_visual_gate_required: true
  approved_visual_reference_folder: "docs/product/superdesign-reference-assets/screenshots1/"
  visual_qa_contract: "docs/product/babyminimo-visual-qa-contract.md"
  screen_contracts_folder: "docs/product/screen-contracts/"
  ui_receipts_must_include:
    - "approved screenshot used"
    - "simulator screenshot path"
    - "known visual differences"
    - "scroll positions captured for scrollable screens"
  local_verification_urls:
    firebase_auth_ui: "http://127.0.0.1:4000/auth"
    browser_simulator: "http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"
  opencode_model_policy:
    preferred_code_worker: "opencode-go/glm-5.1"
    safe_fallback_code_worker: "opencode-go/qwen3.6-plus"
    tertiary_fallbacks:
      - "opencode-go/deepseek-v4-flash"
      - "opencode-go/deepseek-v4-pro"
    blocked_until_smoke_passes:
      - "opencode-go/kimi-k2.6"
    visual_qa_owner: "Codex"
    notes:
      - "OpenCode workers are code-only unless a real multimodal OpenCode model is explicitly available and smoke-tested."
      - "Codex owns screenshot understanding and final visual QA."

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/"
    command: "node /Users/frank/.codex/skills/goalbuddy/extend/local-goal-board/scripts/local-goal-board.mjs --goal docs/goals/babyminimo-fast-demo"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

