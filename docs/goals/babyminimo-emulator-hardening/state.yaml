      - "files changed"
      - "performance risks found"
      - "lazy-loading or listener changes made"
      - "startup/navigation smoke result"
      - "remaining risks or follow-up PBIs"
    receipt:
      result: done
      summary: "Implemented PBI-059 by narrowing auth/startup imports, focusing active listeners to visible routes, deferring secondary Home growth preview loading, and recording performance notes."
      files_inspected:
        - "app/_layout.tsx"
        - "app/index.tsx"
