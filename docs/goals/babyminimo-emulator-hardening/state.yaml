        required: true
      - command: "bun run test:unit"
        required: true
      - command: "npx expo-doctor"
        required: true
      - command: "Simulator smoke at http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"
        required: true
    expected_receipt:
