version: 2

goal:
  title: "BabyMinimo PBI Delivery Board"
  slug: "babyminimo-emulator-hardening"
  kind: specific
  tranche: "All BabyMinimo PBIs split into smaller GoalBuddy tasks, ordered with local/non-production work before Firebase/App Store production work."
  status: active
  intake:
    original_request: "Add every BabyMinimo PBI to GoalBuddy, split each PBI into smaller tasks, and prioritize work that does not require production Firebase or App Store Connect setup."
    interpreted_outcome: "GoalBuddy shows every PBI as smaller executable cards, with completed work receipted and queued work ordered so local/docs/UI/QA tasks come before production Firebase and App Store tasks."
    input_shape: specific
    audience: "BabyMinimo product owner and engineering team"
    authority: requested
    proof_type: test
    completion_proof: "The local GoalBuddy board renders all PBI subtasks with valid YAML, no unsupported statuses, and production-dependent tasks sequenced last."

agents:
  scout: installed
  worker: installed
  judge: installed

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_production_firebase: true
  no_destructive_backend_purge: true
  local_verification_urls:
    firebase_auth_ui: "http://127.0.0.1:4000/auth"
    firebase_firestore_ui: "http://127.0.0.1:4000/firestore"
    firebase_storage_ui: "http://127.0.0.1:4000/storage"
    browser_simulator: "http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/"

active_task: T352

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    objective: "Audit current Firebase Emulator read/write paths and identify immediate cost risks."
    receipt:
      result: done
      summary: "Current care event reads used a flat careEvents collection read with client filtering. Household/baby/user onboarding writes are simple. Firestore rules are emulator-open and must not be deployed to production."
      evidence:
        - "src/features/demo/events.ts"
        - "src/features/demo/household.ts"
        - "firestore.rules"
  - id: T002
    type: pm
    assignee: PM
    status: done
    objective: "Add emulator load/cost script, optimize care event query, add required index, and add purge policy tests."
    receipt:
      result: done
      summary: "Added PBI-058 through PBI-060, optimized care event reads to baby-scoped ordered/limited queries, declared composite careEvents index, added firebase-emulator-load-test script, and added canceled-subscription heavy-data purge policy with tests."
      changed_files:
        - "docs/product/babyminimo-pbi-codex-goalbuddy-pack.md"
        - "CHANGELOG.md"
        - "firestore.indexes.json"
        - "package.json"
        - "scripts/firebase-emulator-load-test.mjs"
        - "src/features/demo/events.ts"
        - "src/features/subscriptions/index.ts"
        - "src/features/subscriptions/purgePolicy.ts"
        - "src/features/subscriptions/purgePolicy.test.ts"
  - id: T003
    type: pm
    assignee: PM
    status: done
    objective: "Run verification and record emulator I/O/cost receipt."
    expected_output:
      - "test results"
      - "load test JSON summary"
      - "cost caveats"
      - "remaining optimization candidates"
    receipt:
      result: done
      summary: "Verification passed and the first Firebase Emulator load/cost receipt was recorded."
      verification:
        - command: "bun run test:unit"
          result: "passed"
        - command: "bun run test:typecheck"
          result: "passed"
        - command: "bun run test:firebase:load"
          result: "passed with local emulator access approval"
      load_test:
        scenario:
          households: 10
          eventsPerBaby: 40
          readPasses: 5
          latestLimit: 20
          cleanup: true
        counts:
          reads: 1000
          writes: 430
          deletes: 430
        timingsMs:
          reads: 274
          total: 1915
        estimatedOperationCostUsd: 0.00146
      cost_caveats:
        - "This is operation-only emulator output, not a full production bill forecast."
        - "Confirm current location-specific Firestore prices before production budgeting."
        - "Production estimate must include free quota, storage, indexes, egress, backups, Functions, Auth, Cloud Messaging, and store billing infrastructure."
      remaining_optimization_candidates:
        - "Add latest-summary documents for Home/Handoff if realtime listener reads grow."
        - "Avoid global listeners for Timeline, reminders, feature flags, and plan entitlements."
        - "Run larger emulator profiles once production-like listeners and notification data exist."
      docs:
        - "docs/performance/firebase-emulator-cost-discovery.md"
  - id: T004
    type: pm
    assignee: PM
    status: done
    objective: "Implement PBI-059: lazy loading and app performance pass."
    pbi: "PBI-059"
    scope:
      - "Audit route, component, and asset loading for auth, Home, Timeline, Handoff, Reminders, Family, Settings, Plans, Account, and modal flows."
      - "Keep auth bootstrap and Home startup path lean."
      - "Confirm large Superdesign/reference screenshots are not imported into runtime screens."
      - "Delay non-critical listeners, production-only flows, and settings subflows until routes/screens need them."
      - "Record simulator startup/navigation observations and remaining performance risks."
    allowed_paths:
      - "app/**"
      - "src/**"
      - "docs/performance/**"
      - "docs/product/babyminimo-pbi-codex-goalbuddy-pack.md"
      - "CHANGELOG.md"
      - "package.json"
      - "e2e/**"
    forbidden:
      - "Production Firebase deployment"
      - "Production Firebase credentials or secrets"
      - "Destructive backend purge jobs"
      - "Design rewrites not required for performance"
      - "Changing approved screenshots in docs/product/superdesign-reference-assets/screenshots1/"
    verification:
      - command: "bun run test:typecheck"
        required: true
      - command: "bun run test:unit"
        required: true
      - command: "npx expo-doctor"
        required: true
      - command: "Simulator smoke at http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"
        required: true
    expected_receipt:
      - "files inspected"
      - "files changed"
      - "performance risks found"
      - "lazy-loading or listener changes made"
      - "startup/navigation smoke result"
      - "remaining risks or follow-up PBIs"
    receipt:
      result: done
      summary: "Implemented PBI-059 by narrowing auth/startup imports, focusing active listeners to visible routes, deferring secondary Home growth preview loading, and recording performance notes."
      files_inspected:
        - "app/_layout.tsx"
        - "app/index.tsx"
        - "app/(auth)/login.tsx"
        - "app/(auth)/signup.tsx"
        - "app/(tabs)/home.tsx"
        - "app/(tabs)/timeline.tsx"
        - "app/(tabs)/handoff.tsx"
        - "src/providers/AppProvider.tsx"
        - "src/stores/authStore.ts"
        - "src/stores/careEventStore.ts"
        - "src/features/handoff/useHandoffSummary.ts"
        - "docs/performance/firebase-emulator-cost-discovery.md"
      files_changed:
        - "app/index.tsx"
        - "app/(auth)/login.tsx"
        - "app/(auth)/signup.tsx"
        - "app/(onboarding)/add-baby.tsx"
        - "app/(onboarding)/preview.tsx"
        - "app/(settings)/account.tsx"
        - "app/(settings)/plans.tsx"
        - "app/(settings)/reminders.tsx"
        - "app/(tabs)/family.tsx"
        - "app/(tabs)/home.tsx"
        - "app/(tabs)/timeline.tsx"
        - "app/modals/add-moment.tsx"
        - "app/modals/log-bottle.tsx"
        - "app/modals/log-breastfeed.tsx"
        - "app/modals/log-diaper.tsx"
        - "app/modals/log-medication.tsx"
        - "app/modals/log-sleep.tsx"
        - "app/modals/sign-out-confirm.tsx"
        - "src/features/handoff/useHandoffSummary.ts"
        - "src/providers/AppProvider.tsx"
        - "src/stores/authStore.ts"
        - "src/stores/careEventStore.ts"
        - "docs/performance/firebase-emulator-cost-discovery.md"
        - "CHANGELOG.md"
      performance_risks_found:
        - "Broad store/demo barrel imports could load unrelated stores and Firebase-backed adapters into auth and route startup paths."
        - "Home and Timeline could both keep care-event listeners active after navigation if tab screens remained mounted."
        - "Handoff performed a get-then-subscribe pattern that can duplicate reads once backed by production data."
        - "Home loaded secondary Growth Timeline preview data during initial render instead of after the primary handoff snapshot path."
      changes_made:
        - "Replaced broad runtime imports from '@/src/stores' and '@/src/features/demo' with direct route-specific imports."
        - "Changed Home and Timeline event subscriptions to `useFocusEffect` so listeners attach only while visible."
        - "Changed Handoff summary to focused subscription-only loading, avoiding duplicate get/subscription work."
        - "Deferred Home Growth Timeline preview adapter loading with `InteractionManager.runAfterInteractions` and dynamic import."
        - "Confirmed runtime code does not import approved Superdesign screenshot reference folders."
      verification:
        - command: "bun run test:typecheck"
          result: "passed"
        - command: "bun run test:unit"
          result: "passed"
        - command: "npx expo-doctor"
          result: "passed, 20/20 checks"
        - command: "Simulator smoke at http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"
          result: "passed: app loaded login screen without red screen or warning banner; Start your Relay navigated to signup."
      remaining_risks:
        - "Run another profiler pass after notifications, widgets, feature flags, and production entitlements are implemented."
        - "Consider compact latest-summary documents for Home/Handoff before production if listener read volume grows."
