        - "app/(settings)/reminders.tsx"
        - "package.json"
        - "bun.lock"
        - "ios/Podfile.lock"
        - "ios/Pods/**"
        - "src/features/demo/reminders.ts"
        - "src/features/notifications/index.ts"
        - "src/features/notifications/nativeNotifications.ts"
        - "src/features/notifications/notificationPolicy.ts"
        - "src/features/notifications/notificationPolicy.test.ts"
        - "src/features/notifications/useNotificationRouting.ts"
        - "src/providers/AppProvider.tsx"
        - "docs/product/babyminimo-notification-system.md"
        - "docs/goals/babyminimo-emulator-hardening/state.yaml"
        - "CHANGELOG.md"
      notification_permission_states_handled:
        - "notAsked"
        - "granted"
        - "denied"
        - "limited/provisional or ephemeral iOS states when reported by Expo Notifications"
      scheduling_canceling_behavior:
        - "New reminders request permission when needed and schedule a local notification if allowed."
        - "Turning an active reminder off cancels its scheduled notification."
        - "Turning an inactive reminder back on reschedules a notification."
      quiet_hours_behavior:
        - "Non-critical reminder notifications scheduled during 22:00-07:00 are delayed until 07:00."
        - "Notification body uses the reminder title only and does not include sensitive free-text notes."
      verification:
        - command: "bun run test:typecheck"
          result: "passed"
        - command: "bun run test:unit"
          result: "passed"
        - command: "npx expo-doctor"
          result: "passed, 20/20 checks"
        - command: "pod install"
          result: "passed, ExpoNotifications installed"
        - command: "./node_modules/.bin/expo run:ios --no-build-cache --device \"iPhone 16 Pro\" --no-bundler"
          result: "passed, rebuilt and installed dev client"
        - command: "Simulator smoke at http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"
          result: "passed, rebuilt app loaded without red screen"
      production_push_follow_up_risks:
        - "Production push fan-out, APNs/FCM/EAS credentials, and backend scheduling are intentionally not implemented in the emulator slice."
        - "Notification preferences still need production persistence per household/caregiver."
        - "Manual QA on a clean simulator or physical iOS device is still needed for first-run permission prompt behavior."

