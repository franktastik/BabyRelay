      - "Apply quiet-hours handling for non-critical reminder notifications."
      - "Use calm, caregiver-safe notification copy without sensitive free-text notes."
      - "Include deep-link metadata to route notifications to Reminders."
      - "Document push infrastructure decision and production follow-up."
    allowed_paths:
