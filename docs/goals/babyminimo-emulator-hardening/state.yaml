        - "app/(tabs)/handoff.tsx"
        - "src/providers/AppProvider.tsx"
        - "src/stores/authStore.ts"
        - "src/stores/careEventStore.ts"
        - "src/features/handoff/useHandoffSummary.ts"
        - "docs/performance/firebase-emulator-cost-discovery.md"
      files_changed:
        - "app/index.tsx"
        - "app/(auth)/login.tsx"
        - "app/(auth)/signup.tsx"
        - "app/(onboarding)/add-baby.tsx"
        - "app/(onboarding)/preview.tsx"
        - "app/(settings)/account.tsx"
        - "app/(settings)/plans.tsx"
        - "app/(settings)/reminders.tsx"
        - "app/(tabs)/family.tsx"
        - "app/(tabs)/home.tsx"
        - "app/(tabs)/timeline.tsx"
        - "app/modals/add-moment.tsx"
        - "app/modals/log-bottle.tsx"
        - "app/modals/log-breastfeed.tsx"
        - "app/modals/log-diaper.tsx"
        - "app/modals/log-medication.tsx"
        - "app/modals/log-sleep.tsx"
        - "app/modals/sign-out-confirm.tsx"
        - "src/features/handoff/useHandoffSummary.ts"
        - "src/providers/AppProvider.tsx"
        - "src/stores/authStore.ts"
        - "src/stores/careEventStore.ts"
        - "docs/performance/firebase-emulator-cost-discovery.md"
        - "CHANGELOG.md"
      performance_risks_found:
        - "Broad store/demo barrel imports could load unrelated stores and Firebase-backed adapters into auth and route startup paths."
        - "Home and Timeline could both keep care-event listeners active after navigation if tab screens remained mounted."
        - "Handoff performed a get-then-subscribe pattern that can duplicate reads once backed by production data."
        - "Home loaded secondary Growth Timeline preview data during initial render instead of after the primary handoff snapshot path."
      changes_made:
        - "Replaced broad runtime imports from '@/src/stores' and '@/src/features/demo' with direct route-specific imports."
        - "Changed Home and Timeline event subscriptions to `useFocusEffect` so listeners attach only while visible."
        - "Changed Handoff summary to focused subscription-only loading, avoiding duplicate get/subscription work."
        - "Deferred Home Growth Timeline preview adapter loading with `InteractionManager.runAfterInteractions` and dynamic import."
        - "Confirmed runtime code does not import approved Superdesign screenshot reference folders."
      verification:
        - command: "bun run test:typecheck"
          result: "passed"
        - command: "bun run test:unit"
          result: "passed"
        - command: "npx expo-doctor"
          result: "passed, 20/20 checks"
        - command: "Simulator smoke at http://127.0.0.1:3200/?device=B2C19543-60E2-489E-8E08-4E3F775AD6A0"
          result: "passed: app loaded login screen without red screen or warning banner; Start your Relay navigated to signup."
      remaining_risks:
        - "Run another profiler pass after notifications, widgets, feature flags, and production entitlements are implemented."
        - "Consider compact latest-summary documents for Home/Handoff before production if listener read volume grows."
