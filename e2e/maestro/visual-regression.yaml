- assertVisible: Quick log
- takeScreenshot: e2e-artifacts/quick-log
- openLink: babyminimo:///(tabs)/timeline
- assertVisible: Timeline
- takeScreenshot: e2e-artifacts/timeline
- openLink: babyminimo:///modals/add-moment
- assertVisible: Add a moment
- takeScreenshot: e2e-artifacts/add-moment
- openLink: babyminimo:///(tabs)/handoff
